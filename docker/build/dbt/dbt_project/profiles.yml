starrocks:
  target: dev
  outputs:
    dev:
      type: starrocks
      host: "{{ env_var('STARROCKS_HOST', '127.0.0.1') }}"
      port: "{{ env_var('STARROCKS_PORT', 9030) | as_number }}"
      schema: "{{ env_var('STARROCKS_DATABASE', 'dwd') }}"
      user: "{{ env_var('STARROCKS_USER', 'root') }}"
      password: "{{ env_var('STARROCKS_PASSWORD', '') }}"
      threads: 4
